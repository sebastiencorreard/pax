services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pax"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./ressources:/ressources:ro
    environment:
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      RESOURCES_ROOT: /ressources
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped

volumes:
  pgdata:
