services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: pax
      POSTGRES_PASSWORD: pax
      POSTGRES_DB: pax
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pax"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - ./ressources:/ressources:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://pax:pax@db:5432/pax
      # Change SECRET_KEY before deploying to production
      SECRET_KEY: dev-only-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      RESOURCES_ROOT: /ressources
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8001
      # Set to "false" to hide the raw .oef source debug panel under each exercise
      NUXT_PUBLIC_DEBUG_OEF: "true"

volumes:
  pgdata:
