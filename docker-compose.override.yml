services:
  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pax
      POSTGRES_PASSWORD: pax
      POSTGRES_DB: pax

  backend:
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://pax:pax@db:5432/pax
      # Dev-only JWT key. ≥32 chars to satisfy the startup validator;
      # never reused in prod (docker-compose.prod.yml takes ${SECRET_KEY}
      # from the operator's .env).
      SECRET_KEY: dev-only-key-DO-NOT-USE-IN-PRODUCTION
      # Hot reload via uvicorn --reload, watched against the bind-mount below.
      UVICORN_RELOAD: "1"
    volumes:
      # Bind-mount the source so edits trigger uvicorn's reloader. The
      # anonymous volumes below mask local artifacts (`.venv`, pycache)
      # so the container keeps using its own system-installed packages.
      - ./backend:/app
      - /app/.venv
      - /app/__pycache__

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:8001
      NUXT_PUBLIC_DEBUG_OEF: "true"
