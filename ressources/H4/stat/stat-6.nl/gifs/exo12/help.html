<html>
<body>
 <div id="imgbox">
 </div>
 <script type="text/javascript">
  var img = [ "interval0.png","interval1.png","interval2.png","interval3.png","interval4.png","interval5.png","interval6.png" ];
  var len=img.length;
  var div = document.getElementById('imgbox');

  function show(t){
    div.setAttribute("background-image","url:('+img[t]+')");
  };
   for(var p = 1 ; p<len ; p++){
    setTimeout(show(p),500);
   };
 </script>
</body>
</html>
